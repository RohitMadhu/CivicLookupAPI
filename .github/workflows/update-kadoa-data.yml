name: Update Kadoa Disclosure Data

on:
  schedule:
    # Kadoa's public dashboard is static JSON; refresh our cache every 6 hours.
    - cron: '17 */6 * * *'
  workflow_dispatch:

jobs:
  update-kadoa-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Fetch latest Kadoa disclosure JSON
        run: |
          python scripts/fetch_kadoa_data.py

      - name: Check for disclosure data changes
        id: check_changes
        run: |
          if git diff --quiet data/financial_disclosures.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated disclosure data
        if: steps.check_changes.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): refresh Kadoa disclosure data [skip ci]"
          file_pattern: data/financial_disclosures.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
